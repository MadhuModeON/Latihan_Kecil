<!doctype html>
<html>
<head>
<style>
button {
width: 300px;
height: 50px;
background: red;
cursor: pointer;
color: white;
font-Size: 12px;
text-shadow:
        -1px -1px 0 black,
         0px -1px 0 black,
         1px -1px 0 black,
        -1px  0px 0 black,
         1px  0px 0 black,
        -1px  1px 0 black,
         0px  1px 0 black,
         1px  1px 0 black;
position: absolute;
top: 500px;
left: 50px;
}
#hpbar {
width: 370px;
height: 20px;
text-align: center;
background: green;
border: 2px solid black;

}
#hpbarP {
width: 230px;
height: 20px;
text-align: center;
background: green;
border: 2px solid black;
position: absolute;
top: 470px;
left: 85px;
}
#level {
color: yellow;
text-shadow:
        -1px -1px 0 black,
         0px -1px 0 black,
         1px -1px 0 black,
        -1px  0px 0 black,
         1px  0px 0 black,
        -1px  1px 0 black,
         0px  1px 0 black,
         1px  1px 0 black;
font-Size: 26px;
}
#save {
width: 100px;
height: 33px;
background: blue;
border: 3px solid black;
cursor: pointer;
font-Size: 30px;
color: white;
text-align: center;
position: absolute;
top: 740px;
left: 288px;
}
.upgrade {
width: 180px;
height: 18px;
background: gray;
border: 3px solid black;
cursor: pointer;
font-Size: 16px;
color: black;
text-align: center;
position: absolute;
top: 80px;
left: 10px;
}
</style>
</head>
<body>
<div id="hpbar">100/100</div>
<div id="id">Enemy 1</div>
<div id="xp" style="color: blue; position: absolute; top: 450px;">XP: 0/5</div>
<div id="dust" style="color: gray; position: absolute; top: 430px;">DUST: ???</div>
<div id="level">Level 1</div>
<div id="hpbarP">20/20</div>
<button id="attack">Damage: 1</button>
<div id="save">SAVE</div>
<div class="upgrade" id="up1">DUSTED</div>
<div class="upgrade" id="up2" style="left: 200px;">DUSTED</div>
<div class="upgrade" id="up3" style="top: 170px;">ROUTINE Unlock Auto Cost: 7 Dust</div>
</body>
<script>

let player = {
level: 1,
damage: 1,
xp: 0,
xpneed: 100,
hp: 20,
maxhp: 20,
dust: 0,
dmgmult1: 1,
hpmult1: 1,
cost1: 1,
cost2: 1,
autoattack: false,
ehp: 30,
emaxhp: 30,
edamage: 1,
enemyid: 1
};
let up3 = document.getElementById("up3")
console.log(player)
let musuh = false
wait = ms => new Promise(resolve => setTimeout(resolve, ms));

let data = localStorage.getItem("player")
if (data) {
player = JSON.parse(data)
if (player.autoattack == true) {
up3.innerText = "Dipelajari"
setInterval(function() {
player.ehp -= player.damage
if (player.ehp <= 0) {
player.emaxhp *= 1.2
player.ehp = player.emaxhp
player.edamage += 1
player.xp += player.emaxhp * (Math.random() * 1 + 1)
player.enemyid += 1
levelup()
}
update()
}, 500);
}
}

let save = document.getElementById("save")
let issaving = false
save.addEventListener("click", async function() {
if (issaving == false) {
issaving = true
localStorage.setItem("player", JSON.stringify(player));
save.innerText = "SAVED"
save.style.background = "red";
await wait(5000);
issaving = false
save.innerText = "SAVE";
save.style.background = "blue";
}
});



update()
function update() {
document.getElementById("attack").innerText = "Damage: " + player.damage
document.getElementById("hpbarP").innerText = Math.floor(player.hp) + " / " + Math.floor(player.maxhp)
document.getElementById("hpbar").innerText = Math.floor(player.ehp) + " / " + Math.floor(player.emaxhp)
document.getElementById("level").innerText = "Level[ " + player.level + " ]"
document.getElementById("xp").innerText = "XP. ( " + Math.floor(player.xp) + " / " + player.xpneed + " )"
document.getElementById("id").innerText = "Enemy " + player.enemyid
document.getElementById("dust").innerText = "DUST " + player.dust
document.getElementById("up1").innerText = "ADAPT +10% MAXHP\n" + "Cost: " + player.cost1 + " DUST"
document.getElementById("up2").innerText = "ADAPT +10% DMG\n" + "Cost: " + player.cost2 + " DUST"
console.log(player.cost1)
}

setInterval(function() {
if (musuh == false) {
player.ehp = player.emaxhp
musuh = true
}
if (musuh == true && player.ehp >= 0 ) {
player.hp -= player.edamage
if (player.hp <= 0 && player.enemyid !== 1) {
player.enemyid -= 1
player.edamage -= 1
player.emaxhp = player.emaxhp * 0.833333333
player.hp = player.maxhp
player.ehp = player.emaxhp
alert("kamu mati, ya")
player.dust += (1.002 ** player.level) - 1
} else if (player.hp <= 0) {
player.hp = player.maxhp
player.ehp = player.emaxhp
alert("Tolong KLIK tombolnya")
}
}
update()
}, 500);

let attack = document.getElementById("attack")
attack.addEventListener("click", function() {
player.dust += 29982
player.ehp -= player.damage
if (player.ehp <= 0) {
player.emaxhp *= 1.2
player.ehp = player.emaxhp
player.edamage += 1
player.xp += player.emaxhp * (Math.random() * 0.5 + 1)
player.enemyid += 1
levelup()
}
update()
});

function levelup() {
while (player.xp >= player.xpneed) {
if (player.xp >= player.xpneed) {
player.xp -= player.xpneed
player.xpneed *= 1.3
player.level += 1
player.maxhp = (20 + player.level * 2) * player.hpmult1
player.hp = player.maxhp
player.damage = player.level * player.dmgmult1
} else {
return;
}
}
update()
}

let up1 = document.getElementById("up1")
up1.addEventListener("click", function () {
if (player.dust >= player.cost1) {
player.dust -= player.cost1;
player.cost1 += 0.1;
player.hpmult1 += 0.1
player.maxhp = (20 + player.level * 2) * player.hpmult1
console.log(player.hpmult1)
update()
} else {
alert("tidak cukup")
}
});
let up2 = document.getElementById("up2")
up2.addEventListener("click", function() {
if (player.dust >= player.cost2) {
player.dust -= player.cost2;
player.cost2 += 0.2;
player.dmgmult1 += 0.1
player.damage = player.level * player.dmgmult1
console.log(player.dmgmult1)
update()
} else {
alert("Kamu tidak mampu")
}
});


up3.addEventListener("click", function() {
if (player.dust >= 7 && player.autoattack == false) {
player.dust -= 7
player.autoattack = true
up3.innerText = "Dipelajari"
setInterval(function() {
player.ehp -= player.damage
if (player.ehp <= 0) {
player.emaxhp *= 1.2
player.ehp = player.emaxhp
player.edamage += 1
player.xp += player.emaxhp * (Math.random() * 1 + 1)
player.enemyid += 1
levelup()
}
update()
}, 500);
} else if (player.autoattack == true) {
alert("Sudah cukup terbiasa")
} else {
alert("Kamu menyerah")
}
});
</script>
</html>
