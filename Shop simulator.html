<!doctype html>
<html>
<head>
<title>SHOP SIMULATOR HD</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
button {
width: 100px;
height: 30px;
cursor: pointer;
}
#shop {
width: 370px;
height: 600px;
background: brown;
border: 3px solid black;
display: none;
margin-top: 10px;
}
#invenbox {
width: 370px;
height: 600px;
background: black;
border: 3px solid grey;
display: none;
margin-top: 10px;
}
.shopbutton {
width: 340px;
height: 20px;
cursor: pointer;
background: black;
border: 2px solid gray;
margin: 10px;
color: white;
font-Size: 16px;
}
#itembox {
width: 300px;
height: 500px;
background: black;
border: 3px solid white;
position: absolute;
top: 130px;
left: 43px;
display: none;
}
#closebutton {
width: 100px;
height: 35px;
background: red;
border: 2px solid gray;
cursor: pointer;
position: absolute;
top: 480px;
left: 92px;
text-align: center;
}
#buybutton {
width: 200px;
height: 20px;
background: red;
border: 2px solid white;
cursor: pointer;
position: absolute;
top: 420px;
left: 45px;
text-align: center;
font-Size: 20px;
}

</style>
</head>
<body>
<h1>-SHOP SIMULATOR RTX-<h1>
<div id="duit">Rp 1000</div>
<div id="dmgtext">Damage: 67</div>
<div id="auratext">AURA: 67000++</div>
<input type="number" id="atm" placeholder="Masukan angka...">
<button onclick="pinjam()">Pinjam</button>
<button onclick="openshop()">Open Shop</button>
<button onclick="openinventory()">Check Items</button>
<div id="shop">
<h2>The Shop</h2>
<div class="shopbutton" onclick="showitem(items[0].name, items[0].damage, items[0].price, items[0].desc, 0)">Sarung Tangan Thanos FULL Stone mode ON</div>
<div class="shopbutton" onclick="showitem(items[1].name, items[1].damage, items[1].price, items[1].desc, 1)">Prabowo 1000 Hektar sawit Domain Skill</div>
<div class="shopbutton" onclick="showitem(items[2].name, items[2].damage, items[2].price, items[2].desc, 2)">Sendal jepit(100% akurasi enchanted)</div>
<div class="shopbutton" onclick="showitem(items[3].name, items[3].damage, items[3].price, items[3].desc, 3)">while (true) {}</div>
</div>

<div id="itembox">
<h3 id="itemname" style="color: white; text-align: center;">name</h3>
<div id="itemdamage" style="font-Size: 18px; color: red;">damage</div>
<div id="itemprice" style="font-Size: 18px; color: yellow;">price</div>
<div id="itemdesc" style="font-Size: 24px; color: white;">desc</div>
<div id="buybutton" onclick="buyitem()">BUY</div>
<div id="closebutton" onclick="closeitem()">CLOSE</div>
</div>

<div id="invenbox">
<h2>Inventory<h2>
<div id="inventext" style="color: white; font-Size: 12px;">dd</div>
</div>

</body>
<script>
let selecteditem = 0
let rupiah = 1000
let damage = 67
let aura = rupiah * 67
let wait = ms => new Promise(resolve => setTimeout(resolve, ms));
let inventory = []
let text = []
let items = [
{
name: "Sarung Tangan Thanos FULL Stone mode ON",
damage: 120293767,
price: 2900000000000,
desc: "Kekuatan penuh Infinity Gauntlet",
},
{
name: "Prabowo 1000 Hektar sawit Domain Skill",
damage: 16800000,
price: 9999999999,
desc: "Meski begitu, harga bbm masih naik",
},
{
name: "Sendal jepit(100% akurasi enchanted)",
damage: 9999999999999,
price: 30000 + 67000000000000000000,
desc: "30.000 Harga Sendal + 67 Kuintilion biaya administrasi dan skill lempar sendal",
},
{
name: "while (true) {}",
damage: 1 * 10 ** 99 ** 99,
price: 4050000,
desc: "4 juta buat beli hp, 50 ribu beli kouta",
}
]

function openinventory() {
let text = ""
for (let i = 0; i < inventory.length; i++) {
text += ((1 + i) + ". " + inventory[i] + "\n");
}



let inv = document.getElementById("invenbox")
if (inv.style.display === "block") {
inv.style.display = "none"
} else {
inv.style.display = "block"
}
document.getElementById("inventext").innerText = text
console.log(text)
}



function openshop() {
let shp = document.getElementById("shop")
let inv = document.getElementById("invenbox")
if (shp.style.display === "block") {
shp.style.display = "none"
} else {
shp.style.display = "block"
inv.style.display = "none"
}
}

function showitem(name, damage, price, desc, index) {
selecteditem = index
document.getElementById("itemname").innerText = name;
document.getElementById("itemdamage").innerText = "Damage: " + damage;
document.getElementById("itemprice").innerText = "Harga: " + price;
document.getElementById("itemdesc").innerText = desc;
document.getElementById("itembox").style.display = "block";
}

function closeitem() {
let itembx = document.getElementById("itembox")
itembx.style.display = "none"
}

function buyitem() {
if (rupiah >= items[selecteditem].price) {
rupiah -= items[selecteditem].price
damage += items[selecteditem].damage
alert("Pembelian Berhasil!")
inventory.push(items[selecteditem].name)
update()
console.log(inventory)
} else {
alert("Error203: Miskin")
}
}

function pinjam() {
input = parseInt(document.getElementById("atm").value)
if (input >= 1) {
rupiah += input
alert(input + " Rupiah Berhasil di pinjam!")
update()
}
}

function update() {
aura = rupiah * damage
document.getElementById("duit").innerText = "Rp " + rupiah
document.getElementById("auratext").innerText = "AURA: " + aura + "++"
document.getElementById("dmgtext").innerText = "Damage: " + damage
}
</script>
<html>
